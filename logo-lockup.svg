<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" role="img" aria-label="SummitStudios">
  <title>SummitStudios</title>
  <defs>
    <linearGradient id="lk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <mask id="lkCut">
      <rect x="0" y="0" width="64" height="64" rx="14" fill="#fff"/>
      <polyline points="16,44 48,44 22,32 48,32 22,20 48,20" fill="none" stroke="#000" stroke-width="6.5" stroke-linejoin="round" stroke-linecap="round"/>
    </mask>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
      .wm{font-family:'Space Grotesk','Segoe UI',sans-serif;font-weight:700;font-size:27px;fill:#0e0c22;letter-spacing:-0.5px}
      @media (prefers-color-scheme: dark){.wm{fill:#f5f3ff}}
    </style>
  </defs>
  <g transform="translate(8,8) scale(0.625)">
    <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#lk)" mask="url(#lkCut)"/>
  </g>
  <text class="wm" x="62" y="37">SummitStudios</text>
</svg>
